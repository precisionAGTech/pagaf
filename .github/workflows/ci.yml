name: PAGAF CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    name: Validate & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML syntax
        run: |
          echo "=== Checking HTML ==="
          # Basic HTML validation - check for unclosed tags
          python3 -c "
          import html.parser, sys
          class V(html.parser.HTMLParser):
            def __init__(self):
              super().__init__()
              self.errors = 0
            def handle_starttag(self, tag, attrs): pass
            def handle_endtag(self, tag): pass
          try:
            v = V()
            v.feed(open('index.html').read())
            print('HTML parsed successfully')
          except Exception as e:
            print(f'HTML error: {e}')
            sys.exit(1)
          "

      - name: Check file sizes
        run: |
          echo "=== File Sizes ==="
          echo "HTML: $(wc -c < index.html) bytes"
          echo "CSS:  $(wc -c < css/pagaf.css) bytes"
          echo "JS:   $(wc -c < js/pagaf.js) bytes"
          echo ""
          total=$(cat index.html css/pagaf.css js/pagaf.js | wc -c)
          echo "Total bundle: $total bytes ($(echo "scale=1; $total/1024" | bc)KB)"
          if [ $total -gt 500000 ]; then
            echo "::warning::Total bundle size exceeds 500KB"
          else
            echo "✅ Bundle size OK"
          fi

      - name: Verify required files exist
        run: |
          echo "=== Required Files ==="
          for f in index.html css/pagaf.css js/pagaf.js CONTEXT.md; do
            if [ -f "$f" ]; then
              echo "✅ $f exists ($(wc -c < $f) bytes)"
            else
              echo "❌ $f MISSING"
              exit 1
            fi
          done

      - name: Check CDN dependencies
        run: |
          echo "=== CDN Dependencies ==="
          grep -oP 'src="https://unpkg.com/[^"]*"' index.html || true
          grep -oP 'href="https://unpkg.com/[^"]*"' index.html || true
          echo "CDN check complete"

  deploy-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - name: Wait for GitHub Pages deployment
        run: |
          echo "GitHub Pages auto-deploys from main branch"
          echo "Site URL: https://precisionagtech.github.io"
          echo ""
          echo "Waiting 60s for deployment..."
          sleep 60
          status=$(curl -s -o /dev/null -w "%{http_code}" https://precisionagtech.github.io)
          echo "Site status: HTTP $status"
          if [ "$status" = "200" ]; then
            echo "✅ Site is live!"
          else
            echo "⚠️ Site returned HTTP $status (may still be deploying)"
          fi
